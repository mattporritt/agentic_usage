services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ${LOG_DIR:-./logs}:/app/logs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
